<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andy Dobbs</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Audiowide&display=swap" rel="stylesheet">
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #0a0a0a 0%, #080b09 100%);
            color: #e8e8e8;
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
            min-height: 100svh;
        }


        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 12rem 2rem;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            justify-content: top;
        }

        .header {
            text-align: center;
        }

        h1 {
            font-family: 'Audiowide', sans-serif;
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 1rem;
            color: #e8e8e8;
            line-height: 1.3;
        }

        .description {
            font-size: 1.5rem;
            color: #cccccc;
            max-width: 600px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10rem 2rem;
            }
            
            h1 {
                font-size: 2rem;
            }

            .description {
              font-size: 1.125rem;
            }
        }
        

        /* Background Animation Container */
        .animation-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        /* Static Star Field */
        .star-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }

        .star.bright {
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.65);
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.25);
        }


        /* Bottom Gradient Background */
        .gradient-background {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40vh;
            z-index: 8;
            pointer-events: none;
            background: linear-gradient(to top, rgba(13, 122, 95, 0.18) 0%, rgba(13, 122, 95, 0.09) 50%, transparent 100%);
        }


        /* Animated Spacejelly */
        .spacejelly {
            position: absolute;
            width: 10px;
            height: 16px;
            background: linear-gradient(to top, rgba(13, 122, 95, 0.9) 0%, rgba(13, 122, 95, 0.7) 40%, rgba(26, 158, 128, 0.8) 70%, rgba(52, 186, 155, 0.6) 100%);
            border-radius: 50% 50% 20% 20%;
            animation: spacejelly-flight 6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            /* Prevent initial flash at top by starting with animation's 0% state */
            transform: translateY(105vh) translateX(0) scale(0.5);
            opacity: 0;
            box-shadow: 0 0 8px rgba(13, 122, 95, 0.5), 0 0 16px rgba(200, 255, 220, 0.3);
        }
        
        .spacejelly::before {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 6px;
            height: 10px;
            background: linear-gradient(to bottom, rgba(13, 122, 95, 0.6) 0%, rgba(200, 255, 220, 0.4) 50%, transparent 100%);
            border-radius: 50% 50% 0 0;
            box-shadow: 0 0 8px rgba(13, 122, 95, 0.4);
        }


        /* Spacejelly flight animation */
        @keyframes spacejelly-flight {
            0% {
                transform: translateY(105vh) translateX(0) scale(0.5);
                opacity: 0;
            }
            20% {
                transform: translateY(75vh) translateX(0) scale(1);
                opacity: 1;
            }
            80% {
                transform: translateY(15vh) translateX(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) translateX(0) scale(0.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="animationContainer" class="animation-container"></div>
    <div class="star-field" id="starField"></div>
    <div class="gradient-background"></div>
    <div class="container">
        <div class="header">
            <h1>Andy Dobbs</h1>
            <p class="description">
              Behavior change at scale.
            </p>
        </div>
    </div>
</body>
<script>
  class ParticlePool {
      constructor(size = 100) {
          this.pool = [];
          this.activeParticles = new Set();
          this.size = size;
          this.createPool();
      }
      
      createPool() {
          // Pre-create DOM elements for reuse
          for (let i = 0; i < this.size; i++) {
              const spacejelly = document.createElement('div');
              spacejelly.className = 'spacejelly';
              spacejelly.style.display = 'none'; // Hidden by default
              this.pool.push(spacejelly);
          }
      }
      
      acquire() {
          if (this.pool.length > 0) {
              const particle = this.pool.pop();
              this.activeParticles.add(particle);
              particle.style.display = 'block';
              return particle;
          }
          
          // Fallback: create new if pool is empty
          const spacejelly = document.createElement('div');
          spacejelly.className = 'spacejelly';
          this.activeParticles.add(spacejelly);
          
          // Track fallback creation
          if (window.perfMonitor) {
              window.perfMonitor.trackDOMCreation();
          }
          
          return spacejelly;
      }
      
      release(particle) {
          if (this.activeParticles.has(particle)) {
              this.activeParticles.delete(particle);
              particle.style.display = 'none';
              
              // Reset particle properties
              particle.style.animationDelay = '';
              particle.style.animationDuration = '';
              particle._createdAt = null;
              particle._totalDuration = null;
              
              // Return to pool if there's space
              if (this.pool.length < this.size) {
                  this.pool.push(particle);
              } else {
                  // Remove excess particles
                  if (particle.parentNode) {
                      particle.parentNode.removeChild(particle);
                  }
              }
          }
      }
      
      getStats() {
          return {
              poolSize: this.pool.length,
              activeParticles: this.activeParticles.size,
              totalCapacity: this.size
          };
      }
  }

  class ThinkingAnimation {
      constructor() {
          this.container = document.getElementById('animationContainer');
          this.isActive = true;
          this.intensity = 'low';
          this.speed = 1;
          this.density = 4;
          this.particles = [];
          this.particlePool = new ParticlePool(20);
          
          // Zone-based spawning system
          this.zoneCount = 25;
          this.spawnZones = [];
          this.initializeZones();
          
          this.init();
      }

      init() {
          this.createParticles();
          this.animate();
      }

      initializeZones() {
          this.spawnZones = [];
          for (let i = 0; i < this.zoneCount; i++) {
              this.spawnZones.push({
                  occupied: false,
                  lastSpawnTime: 0
              });
          }
      }

      getAvailableZone() {
          const availableZones = [];
          for (let i = 0; i < this.spawnZones.length; i++) {
              if (!this.spawnZones[i].occupied) {
                  availableZones.push(i);
              }
          }
          
          if (availableZones.length === 0) {
              return null; // No zones available
          }
          
          return availableZones[Math.floor(Math.random() * availableZones.length)];
      }

      getZonePosition(zoneIndex) {
          const zoneWidth = window.innerWidth / this.zoneCount;
          const zoneCenter = (zoneIndex + 0.5) * zoneWidth;
          // Add small random offset within zone for visual variety
          const offset = (Math.random() - 0.5) * Math.min(zoneWidth * 0.6, 30);
          return Math.max(0, Math.min(window.innerWidth - 20, zoneCenter + offset));
      }

      createParticles() {
          this.container.innerHTML = '';
          this.particles = [];
          
          // Reset all zones when recreating particles
          this.initializeZones();

          const particleCount = this.density;
          
          for (let i = 0; i < particleCount; i++) {
              this.createParticle('spacejelly', i * 100);
          }
      }

      createParticle(className, delay) {
          // Get available zone for spawning
          const zoneIndex = this.getAvailableZone();
          if (zoneIndex === null) {
              return; // No zones available, skip spawn
          }
          
          const spacejelly = this.particlePool.acquire();
          spacejelly.className = className;
          
          // Zone-based positioning
          const startX = this.getZonePosition(zoneIndex);
          spacejelly.style.left = startX + 'px';
          
          // Mark zone as occupied and store reference
          this.spawnZones[zoneIndex].occupied = true;
          this.spawnZones[zoneIndex].lastSpawnTime = Date.now();
          spacejelly._zoneIndex = zoneIndex;
          
          // Random animation delay
          const animationDelay = delay + Math.random() * 4000;
          const animationDuration = 6000 / this.speed;
          spacejelly.style.animationDelay = animationDelay + 'ms';
          spacejelly.style.animationDuration = animationDuration + 'ms';
          
          // Store creation time and duration for cleanup
          spacejelly._createdAt = Date.now();
          spacejelly._totalDuration = animationDelay + animationDuration;
          
          this.container.appendChild(spacejelly);
          this.particles.push(spacejelly);
      }
      
      releaseParticle(particle) {
          // Free the zone
          if (particle._zoneIndex !== undefined) {
              this.spawnZones[particle._zoneIndex].occupied = false;
              particle._zoneIndex = undefined;
          }
          
          // Remove from DOM
          if (particle.parentNode) {
              particle.parentNode.removeChild(particle);
          }
          
          // Return to pool
          this.particlePool.release(particle);
      }
      
      toggle() {
          this.isActive = !this.isActive;
          this.container.style.display = this.isActive ? 'block' : 'none';
      }

      setIntensity(level) {
          this.intensity = level;
          const intensityMap = {
              'low': 4,
              'medium': 8,
              'high': 12
          };
          this.density = intensityMap[level];
          this.createParticles();
      }

      setSpeed(speed) {
          this.speed = parseFloat(speed);
          this.createParticles();
      }

      setDensity(density) {
          this.density = parseInt(density);
          this.createParticles();
      }

      cleanupParticles() {
          // Remove particles that have completed their animation based on time
          this.particles = this.particles.filter(particle => {
              if (particle.parentNode && this.isParticleFinished(particle)) {
                  this.releaseParticle(particle);
                  return false;
              }
              return particle.parentNode; // Keep particles that are still in DOM
          });
      }

      isParticleFinished(particle) {
          // Check if particle animation has completed based on time
          const now = Date.now();
          const elapsed = now - particle._createdAt;
          return elapsed > particle._totalDuration + 100; // Add 100ms buffer
      }

      animate() {
          if (this.isActive) {
              // Continuously create new spacejelly with proper spacing
              if (Math.random() < 0.01) {  // Even lower frequency for fewer spacejelly
                  const randomDelay = Math.random() * 4000;  // Random delay up to 4 seconds
                  this.createParticle('spacejelly', randomDelay);
              }
              
              // Clean up old particles
              this.cleanupParticles();
          }
          requestAnimationFrame(() => this.animate());
      }
  }

  // Performance monitoring for testing
  class PerformanceMonitor {
    constructor() {
      this.metrics = {
        domCreations: 0,
        frameDrops: 0,
        memoryUsage: [],
        clickResponseTimes: [],
        lastFrameTime: performance.now()
      };
      
      this.startMonitoring();
    }
    
    startMonitoring() {
      // Monitor frame timing
      const measureFrame = () => {
        const now = performance.now();
        const frameDuration = now - this.metrics.lastFrameTime;
        
        if (frameDuration > 16.67) { // Slower than 60fps
          this.metrics.frameDrops++;
          // console.warn(`Slow frame: ${frameDuration.toFixed(2)}ms`);
        }
        
        this.metrics.lastFrameTime = now;
        requestAnimationFrame(measureFrame);
      };
      requestAnimationFrame(measureFrame);
      
      // Monitor memory every 5 seconds
      setInterval(() => {
        if (performance.memory) {
          const memoryMB = Math.round(performance.memory.usedJSHeapSize / 1048576);
          this.metrics.memoryUsage.push(memoryMB);
          // console.log(`Memory usage: ${memoryMB}MB`);
        }
      }, 5000);
      
      // Monitor click response times
      document.addEventListener('click', (e) => {
        const responseTime = performance.now() - e.timeStamp;
        this.metrics.clickResponseTimes.push(responseTime);
        // console.log(`Click response time: ${responseTime.toFixed(2)}ms`);
      });
    }
    
    trackDOMCreation() {
      this.metrics.domCreations++;
    }
    
    getReport() {
      const avgMemory = this.metrics.memoryUsage.reduce((a, b) => a + b, 0) / this.metrics.memoryUsage.length;
      const avgClickTime = this.metrics.clickResponseTimes.reduce((a, b) => a + b, 0) / this.metrics.clickResponseTimes.length;
      
      return {
        domCreations: this.metrics.domCreations,
        frameDrops: this.metrics.frameDrops,
        avgMemoryMB: Math.round(avgMemory),
        avgClickResponseMs: Math.round(avgClickTime),
        totalClicks: this.metrics.clickResponseTimes.length
      };
    }
  }
  
  // Initialize performance monitoring
  const perfMonitor = new PerformanceMonitor();
  window.perfMonitor = perfMonitor; // Make globally accessible
  
  // Add console command to get performance report
  window.getPerformanceReport = () => {
    const report = perfMonitor.getReport();
    console.log('Performance Report:', report);
    return report;
  };
  
  // Initialize animation
  const thinkingAnim = new ThinkingAnimation();
  
  // Create static star field
  function createStarField() {
    const starField = document.getElementById('starField');
    const starCount = 300;
    
    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('div');
      star.className = Math.random() < 0.3 ? 'star bright' : 'star';
      
      // Random position - top 2/3 of viewport
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 66.67 + '%';
      
      // Slight random opacity variation
      const opacity = Math.random() < 0.3 ? 0.65 : 0.4;
      star.style.opacity = opacity + (Math.random() * 0.1 - 0.05);
      
      starField.appendChild(star);
    }
  }
  
  // Initialize star field
  createStarField();
  
  // Add console command to get pool stats
  window.getPoolStats = () => {
    const stats = thinkingAnim.particlePool.getStats();
    console.log('Pool Stats:', stats);
    return stats;
  };

  // Handle window resize
  window.addEventListener('resize', () => {
      thinkingAnim.createParticles();
  });
</script>
</html>
